name: mundial_26
description: "Copa Mundial de la FIFA 2026 - App de seguimiento oficial de partidos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  http: ^1.2.1

  # Images
  cached_network_image: ^3.3.1

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.5.5
  connectivity_plus: ^6.0.3

  cupertino_icons: ^1.0.8
  permission_handler: ^12.0.3
  flutter_local_notifications: ^22.0.1
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.1
  lottie: ^3.3.3
  home_widget: ^0.9.3

  # Video Player
  video_player: ^2.8.6
  chewie: ^1.8.1
  wakelock_plus: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/tv.m3u
